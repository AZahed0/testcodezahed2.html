<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jutter van Den Helder - Sokoban</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --tile-size: 48px;
            --transition-speed: 0.15s;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            overscroll-behavior: none;
            touch-action: none;
            transition: background-image 1s ease-in-out;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            pointer-events: none;
            z-index: 0;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        #game-board {
            position: relative;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.15);
        }

        .game-layer {
            position: absolute;
            top: 0; left: 0;
        }

        .tile, .entity {
            position: absolute;
            width: var(--tile-size);
            height: var(--tile-size);
            box-sizing: border-box;
        }

        .tile-wall {
            background: linear-gradient(145deg, #475569, #1e293b);
            border: 2px solid #0f172a;
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.1);
            z-index: 10;
        }
        
        .tile-floor {
            background: rgba(255, 255, 255, 0.03);
            border: 0.5px solid rgba(255, 255, 255, 0.05);
            z-index: 1;
        }

        .tile-target {
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .tile-target::after {
            content: '';
            width: 35%;
            height: 35%;
            background: rgba(56, 189, 248, 0.4);
            border: 2px solid rgba(56, 189, 248, 0.9);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
        }

        .entity {
            transition: transform var(--transition-speed) cubic-bezier(0.2, 0.8, 0.2, 1.15);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        .player { z-index: 30; }
        .player-inner {
            width: 90%;
            height: 90%;
            background-image: url('https://imagur.org/i/VWJwjZMD');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            transition: transform 0.2s ease;
        }
        .facing-left { transform: scaleX(-1); }

        .box { z-index: 25; }
        .box-inner {
            width: 90%;
            height: 90%;
            background: linear-gradient(145deg, #b45309, #78350f);
            border: 2px solid #451a03;
            border-radius: 4px;
            box-shadow: inset 0 2px 2px rgba(255,255,255,0.1);
            position: relative;
        }
        
        .box.on-target .box-inner {
            background: linear-gradient(145deg, #10b981, #065f46);
            border-color: #064e3b;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.6);
        }

        #start-overlay {
            background-image: url('https://imagur.org/i/8jJ2MC1d');
            background-size: cover;
            background-position: center;
            z-index: 100;
        }
        
        #start-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.85));
        }

        #win-overlay {
            background-image: url('https://imagur.org/i/fCUWSJyM');
            background-size: cover;
            background-position: center;
            z-index: 100;
        }

        #win-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="select-none">

    <header class="p-3 flex justify-between items-center z-10 mx-2 mt-2 glass-panel">
        <div>
            <div class="text-[10px] text-blue-400 uppercase tracking-widest font-extrabold" id="ui-level-name">Laden...</div>
            <div class="flex items-baseline gap-2">
                <span class="text-gray-400 text-xs">Level</span>
                <span id="ui-level" class="text-xl text-white font-black">1</span>
            </div>
        </div>
        <div class="text-right">
            <div class="text-gray-400 text-[10px] uppercase font-bold">Stappen / Par</div>
            <div class="text-xl font-black"><span id="ui-moves">0</span> <span class="text-gray-500 text-sm font-medium">/ <span id="ui-par">0</span></span></div>
        </div>
    </header>

    <main class="flex-1 flex flex-col justify-center items-center p-4 relative overflow-hidden" id="main-container">
        <div id="game-board">
            <div id="layer-tiles" class="game-layer"></div>
            <div id="layer-targets" class="game-layer"></div>
            <div id="layer-entities" class="game-layer"></div>
        </div>
        <p id="ui-story" class="mt-4 text-center text-sm text-gray-300 max-w-xs italic min-h-[40px] px-2"></p>
    </main>

    <footer class="p-3 flex gap-3 justify-center z-10 mx-2 mb-2 glass-panel">
        <button id="btn-undo" class="flex-1 bg-white/10 hover:bg-white/20 disabled:opacity-30 py-3 rounded-xl flex items-center justify-center gap-2 font-bold text-xs uppercase tracking-tighter transition-all">
            Herstel
        </button>
        <button id="btn-restart" class="flex-1 bg-white/10 hover:bg-white/20 py-3 rounded-xl flex items-center justify-center gap-2 font-bold text-xs uppercase tracking-tighter transition-all">
            Herstart
        </button>
    </footer>

    <!-- Start Scherm -->
    <div id="start-overlay" class="fixed inset-0 flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="glass-panel p-8 text-center max-w-sm mx-4 relative z-10">
            <h1 class="text-3xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-br from-blue-400 to-emerald-400 uppercase tracking-tighter">Jutter van Den Helder</h1>
            <p class="text-gray-100 text-sm mb-8 font-medium">Beheer de havenlogistiek en zet alle kratten op hun plek na de storm.</p>
            <button id="btn-start" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl text-lg shadow-xl shadow-blue-900/40 uppercase tracking-widest transition-transform active:scale-95">
                Start Spel
            </button>
        </div>
    </div>

    <!-- Win Scherm -->
    <div id="win-overlay" class="fixed inset-0 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-all duration-500">
        <div class="glass-panel p-10 text-center max-w-sm mx-4 transform scale-90 transition-transform duration-300 relative z-10" id="win-panel">
            <div id="win-stars" class="text-4xl mb-4"></div>
            <h2 class="text-4xl font-black mb-1 text-emerald-400 uppercase tracking-tighter">Top Jutter!</h2>
            <p class="text-white font-bold text-lg mb-6">Loods Schoon</p>
            <p class="text-gray-300 mb-8 text-sm"><span id="win-moves">0</span> zetten gebruikt.</p>
            <button id="btn-next" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-xl text-lg shadow-xl shadow-emerald-900/40 uppercase tracking-widest transition-transform active:scale-95">
                Volgende Level
            </button>
        </div>
    </div>

    { id: 28, name: "Doodlopende Straf", story: "Pas op voor de hoeken.", map: ["############", "# . . . .  #", "# $ ### $  #", "#   # #    #", "# $ ### $  #", "#    @     #", "############"], par: 58 },
    { id: 29, name: "Haven Opslag", story: "Een complexe opslagruimte. Alleen voor de beste jutters.", map: ["  ######  ", "###    ###", "#  $$$$  #", "# ..  .. #", "#   @    #", "##########"], par: 35 },
    { id: 30, name: "Doolhof Druk", story: "De storm komt eraan. Haast je!", map: ["############", "# . . . .  #", "# $  #  $  #", "## ### ### #", "#   $ $    #", "#    @     #", "############"], par: 65 },
    { id: 31, name: "Geen Ruimte", story: "Bijna onmogelijk krap.", map: ["############", "# . . . .  #", "# $$ ### $$ #", "#    #      #", "#  #######  #", "#     @     #", "############"], par: 70 },
    { id: 32, name: "Expert Valstrik", story: "De ultieme test voor de meester jutter. Geen ruimte voor fouten.", map: ["  ####  ", "###  ###", "# .  . #", "#  $$  #", "# .  . #", "#  $$  #", "#  @   #", "########"], par: 80 }
];

let currentLevelIdx = 0;
let grid = [];
let boxes = [];
let player = { x: 0, y: 0, facingLeft: false };
let moves = 0;
let history = [];
let inputLocked = true;
let audioCtx = null;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playNote(freq, type, dur, vol=0.08) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

const sfx = {
    move: () => playNote(320, 'sine', 0.1, 0.03),
    push: () => playNote(140, 'square', 0.15, 0.05),
    bump: () => playNote(180, 'sawtooth', 0.08, 0.02),
    target: () => playNote(523, 'sine', 0.25, 0.07),
    win: () => [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playNote(f, 'sine', 0.4, 0.05), i * 100))
};

function loadLevel(idx) {
    const data = LEVELS[idx];
    grid = []; boxes = []; moves = 0; history = []; inputLocked = false;
    
    // Cycle theme based on level index
    const themeKey = THEMES[idx % THEMES.length];
    document.body.style.backgroundImage = `url('${levelBackgrounds[themeKey]}')`;
    
    document.getElementById('ui-level').innerText = data.id;
    document.getElementById('ui-level-name').innerText = data.name;
    document.getElementById('ui-par').innerText = data.par;
    document.getElementById('ui-story').innerText = data.story;
    document.getElementById('ui-moves').innerText = 0;
    document.getElementById('btn-undo').disabled = true;

    const layerT = document.getElementById('layer-tiles');
    const layerG = document.getElementById('layer-targets');
    const layerE = document.getElementById('layer-entities');
    layerT.innerHTML = layerG.innerHTML = layerE.innerHTML = '';

    let maxCols = 0;
    data.map.forEach((line, y) => {
        const row = line.split('');
        if (row.length > maxCols) maxCols = row.length;
        const gridRow = [];
        row.forEach((char, x) => {
            let cell = '.';
            if (char === '#') cell = '#';
            else if (char === '.' || char === '+' || char === '*') cell = '*';
            gridRow.push(cell);
            if (char === '@' || char === '+') player = { x, y, facingLeft: player.facingLeft };
            if (char === '$' || char === '*') boxes.push({ id: `b-${boxes.length}`, x, y });
        });
        grid.push(gridRow);
    });

    setupScale(maxCols, grid.length);
    renderGrid(maxCols, grid.length);
    renderEntities();
}

function setupScale(cols, rows) {
    const container = document.getElementById('main-container');
    const availableW = container.clientWidth - 40;
    const availableH = container.clientHeight - 100;
    
    const size = Math.min(60, Math.floor(availableW / cols), Math.floor(availableH / rows));
    document.documentElement.style.setProperty('--tile-size', `${size}px`);
    
    const board = document.getElementById('game-board');
    board.style.width = `${cols * size}px`;
    board.style.height = `${rows * size}px`;
}

function renderGrid(cols, rows) {
    const layerT = document.getElementById('layer-tiles');
    const layerG = document.getElementById('layer-targets');
    for (let y = 0; y < rows; y++) {
        for (let x = 0; x < (grid[y] ? grid[y].length : 0); x++) {
            const cell = grid[y][x];
            if (!cell) continue;
            const tile = document.createElement('div');
            tile.className = `tile ${cell === '#' ? 'tile-wall' : 'tile-floor'}`;
            tile.style.transform = `translate(${x * 100}%, ${y * 100}%)`;
            layerT.appendChild(tile);
            if (cell === '*') {
                const targ = document.createElement('div');
                targ.className = 'tile tile-target';
                targ.style.transform = `translate(${x * 100}%, ${y * 100}%)`;
                layerG.appendChild(targ);
            }
        }
    }
}

function renderEntities() {
    const layerE = document.getElementById('layer-entities');
    let pEl = document.getElementById('player');
    if (!pEl) {
        pEl = document.createElement('div');
        pEl.id = 'player';
        pEl.className = 'entity player';
        pEl.innerHTML = '<div class="player-inner"></div>';
        layerE.appendChild(pEl);
    }
    pEl.style.transform = `translate(${player.x * 100}%, ${player.y * 100}%)`;
    pEl.querySelector('.player-inner').classList.toggle('facing-left', player.facingLeft);

    boxes.forEach(b => {
        let bEl = document.getElementById(b.id);
        if (!bEl) {
            bEl = document.createElement('div');
            bEl.id = b.id;
            bEl.className = 'entity box';
            bEl.innerHTML = '<div class="box-inner"></div>';
            layerE.appendChild(bEl);
        }
        bEl.style.transform = `translate(${b.x * 100}%, ${b.y * 100}%)`;
        bEl.classList.toggle('on-target', grid[b.y][b.x] === '*');
    });
}

function tryMove(dx, dy) {
    if (inputLocked) return;
    
    if (dx < 0) player.facingLeft = true;
    if (dx > 0) player.facingLeft = false;

    const nx = player.x + dx, ny = player.y + dy;
    if (!grid[ny] || grid[ny][nx] === '#' || grid[ny][nx] === undefined) { 
        sfx.bump(); 
        renderEntities(); 
        return; 
    }
    
    const box = boxes.find(b => b.x === nx && b.y === ny);
    if (!box) {
        saveHistory();
        player.x = nx; player.y = ny;
        moves++; sfx.move();
        finishMove();
        return;
    }

    const bx = nx + dx, by = ny + dy;
    if (!grid[by] || grid[by][bx] === '#' || grid[by][bx] === undefined || boxes.find(b => b.x === bx && b.y === by)) {
        sfx.bump(); renderEntities(); return;
    }

    saveHistory();
    box.x = bx; box.y = by;
    player.x = nx; player.y = ny;
    moves++; sfx.push();
    if (grid[by][bx] === '*') sfx.target();
    finishMove();
}

function saveHistory() {
    history.push({ p: {...player}, b: boxes.map(x => ({...x})), m: moves });
    document.getElementById('btn-undo').disabled = false;
}

function undo() {
    if (!history.length || inputLocked) return;
    const s = history.pop();
    player = s.p; boxes = s.b; moves = s.m;
    if (!history.length) document.getElementById('btn-undo').disabled = true;
    document.getElementById('ui-moves').innerText = moves;
    renderEntities();
}

function finishMove() {
    document.getElementById('ui-moves').innerText = moves;
    renderEntities();
    if (boxes.every(b => grid[b.y][b.x] === '*')) {
        inputLocked = true;
        setTimeout(() => { sfx.win(); showWin(); }, 500);
    }
}

function showWin() {
    const overlay = document.getElementById('win-overlay');
    const panel = document.getElementById('win-panel');
    const starContainer = document.getElementById('win-stars');
    document.getElementById('win-moves').innerText = moves;
    
    const par = LEVELS[currentLevelIdx].par;
    starContainer.innerText = moves <= par ? "⭐⭐⭐" : (moves <= par * 1.4 ? "⭐⭐" : "⭐");
    
    overlay.classList.remove('opacity-0', 'pointer-events-none');
    panel.classList.remove('scale-90');
}

window.addEventListener('keydown', e => {
    initAudio();
    if (["ArrowUp", "w"].includes(e.key)) tryMove(0, -1);
    if (["ArrowDown", "s"].includes(e.key)) tryMove(0, 1);
    if (["ArrowLeft", "a"].includes(e.key)) tryMove(-1, 0);
    if (["ArrowRight", "d"].includes(e.key)) tryMove(1, 0);
    if (e.key === 'z' && e.ctrlKey) undo();
});

let tX, tY;
window.addEventListener('touchstart', e => { tX = e.touches[0].clientX; tY = e.touches[0].clientY; initAudio(); });
window.addEventListener('touchend', e => {
    if (inputLocked) return;
    const dx = e.changedTouches[0].clientX - tX, dy = e.changedTouches[0].clientY - tY;
    if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
        if (Math.abs(dx) > Math.abs(dy)) tryMove(dx > 0 ? 1 : -1, 0);
        else tryMove(0, dy > 0 ? 1 : -1);
    }
});

document.getElementById('btn-start').onclick = () => {
    initAudio();
    document.getElementById('start-overlay').style.opacity = '0';
    setTimeout(() => { document.getElementById('start-overlay').remove(); loadLevel(0); }, 700);
};

document.getElementById('btn-restart').onclick = () => loadLevel(currentLevelIdx);
document.getElementById('btn-undo').onclick = undo;
document.getElementById('btn-next').onclick = () => {
    document.getElementById('win-overlay').classList.add('opacity-0', 'pointer-events-none');
    document.getElementById('win-panel').classList.add('scale-90');
    currentLevelIdx = (currentLevelIdx + 1) % LEVELS.length;
    setTimeout(() => loadLevel(currentLevelIdx), 400);
};

window.onresize = () => { if (grid.length) setupScale(grid[0].length, grid.length); };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jutter van Den Helder - Sokoban</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --tile-size: 48px;
            --transition-speed: 0.15s;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            overscroll-behavior: none;
            touch-action: none;
            transition: background-image 1s ease-in-out;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            pointer-events: none;
            z-index: 0;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        #game-board {
            position: relative;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.15);
            max-width: 100%;
            max-height: 100%;
            margin: auto;
        }

        .game-layer {
            position: absolute;
            top: 0; left: 0;
        }

        .tile, .entity {
            position: absolute;
            width: var(--tile-size);
            height: var(--tile-size);
            box-sizing: border-box;
        }

        .tile-wall {
            background: linear-gradient(145deg, #475569, #1e293b);
            border: 2px solid #0f172a;
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.1);
            z-index: 10;
        }
        
        .tile-floor {
            background: rgba(255, 255, 255, 0.03);
            border: 0.5px solid rgba(255, 255, 255, 0.05);
            z-index: 1;
        }

        .tile-target {
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .tile-target::after {
            content: '';
            width: 35%;
            height: 35%;
            background: rgba(56, 189, 248, 0.4);
            border: 2px solid rgba(56, 189, 248, 0.9);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
        }

        .entity {
            transition: transform var(--transition-speed) cubic-bezier(0.2, 0.8, 0.2, 1.15);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        .player { z-index: 30; }
        .player-inner {
            width: 90%;
            height: 90%;
            background-image: url('https://imagur.org/i/VWJwjZMD');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            transition: transform 0.2s ease;
        }
        .facing-left { transform: scaleX(-1); }

        .box { z-index: 25; }
        .box-inner {
            width: 90%;
            height: 90%;
            background: linear-gradient(145deg, #b45309, #78350f);
            border: 2px solid #451a03;
            border-radius: 4px;
            box-shadow: inset 0 2px 2px rgba(255,255,255,0.1);
            position: relative;
        }
        
        .box.on-target .box-inner {
            background: linear-gradient(145deg, #10b981, #065f46);
            border-color: #064e3b;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.6);
        }

        #start-overlay {
            background-image: url('https://imagur.org/i/8jJ2MC1d');
            background-size: cover;
            background-position: center;
            z-index: 100;
        }
        
        #start-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.85));
        }

        #win-overlay {
            background-image: url('https://imagur.org/i/fCUWSJyM');
            background-size: cover;
            background-position: center;
            z-index: 100;
        }

        #win-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
        }

        .ctrl-btn {
            background: linear-gradient(145deg, rgba(59,130,246,0.6), rgba(37,99,235,0.4));
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 10px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            transition: all 0.1s ease;
        }

        .ctrl-btn:active {
            transform: scale(0.85);
            box-shadow: 0 2px 5px rgba(0,0,0,0.6);
        }

        @media (max-width: 500px) {
            .ctrl-btn {
                padding: 8px;
                font-size: 16px;
            }
        }

        @media (hover: hover) and (pointer: fine) {
            #mobile-controls {
                opacity: 0.6;
                position: fixed;
                bottom: 20px;
                right: 20px;
                transform: scale(0.8);
            }
        }
    </style>
</head>

            <button id="btn-start" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl text-lg shadow-xl shadow-blue-900/40 uppercase tracking-widest transition-transform active:scale-95">
                Start Spel

    </div>

        <div class="glass-panel p-10 text-center max-w-sm mx-4 transform scale-90 transition-transform duration-300 relative z-10" id="win-panel">

                Volgende Level

let boxes = [];

let history = [];

// Cache DOM elements
const uiMoves = document.getElementById('ui-moves');

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playNote(freq, type, dur, vol=0.08) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

function vibrate(ms = 30) {
    if (navigator.vibrate) navigator.vibrate(ms);
}

const sfx = {
    move: () => playNote(320, 'sine', 0.1, 0.03),
    push: () => playNote(140, 'square', 0.15, 0.05),
    bump: () => playNote(180, 'sawtooth', 0.08, 0.02),
    target: () => playNote(523, 'sine', 0.25, 0.07),
    win: () => [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playNote(f, 'sine', 0.4, 0.05), i * 100)),
    hover: () => playNote(800, 'sine', 0.05, 0.02),
    error: () => playNote(90, 'sawtooth', 0.2, 0.06),
    stepCombo: () => [300, 350, 400].forEach((f,i)=>setTimeout(()=>playNote(f,'sine',0.1,0.03), i*50)),
};

document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('mouseenter', () => sfx.hover());
});

function loadLevel(idx) {
    const data = LEVELS[idx];
    grid = []; boxes = []; moves = 0; history = []; inputLocked = false;
    
    // Cycle theme based on level index
    const themeKey = THEMES[idx % THEMES.length];
    document.body.style.backgroundImage = `url('${levelBackgrounds[themeKey]}')`;
    if (themeKey === 'storm') {
        document.body.style.filter = "contrast(1.2) brightness(0.9)";
    }
    
    uiLevel.innerText = data.id;
    uiLevelName.innerText = data.name;
    uiPar.innerText = data.par;
    const randomLore = LORE[Math.floor(Math.random() * LORE.length)];
    uiStory.innerHTML = 
        `<span class="text-blue-300 font-semibold">${data.story}</span><br><br>
         <span class="text-emerald-300 text-sm">🌊 ${randomLore}</span>`;
    uiMoves.innerText = 0;
    btnUndo.disabled = true;

    const layerT = document.getElementById('layer-tiles');
    const layerG = document.getElementById('layer-targets');
    const layerE = document.getElementById('layer-entities');
    layerT.innerHTML = layerG.innerHTML = layerE.innerHTML = '';

    let maxCols = 0;
    data.map.forEach((line) => {
        if (line.length > maxCols) maxCols = line.length;
    });

    data.map.forEach((line, y) => {
        const row = line.padEnd(maxCols, ' ').split('');
        const gridRow = [];
        row.forEach((char, x) => {
            let cell = '.';
            if (char === '#') cell = '#';
            else if (char === '.' || char === '+' || char === '*') cell = '*';
            gridRow.push(cell);
            if (char === '@' || char === '+') player = { x, y, facingLeft: player.facingLeft };
            if (char === '$' || char === '*') boxes.push({ id: `b-${boxes.length}`, x, y });
        });
        grid.push(gridRow);
    });

    setupScale(maxCols, grid.length);
    renderGrid(maxCols, grid.length);
    renderEntities();
}

function setupScale(cols, rows) {
    const container = document.getElementById('main-container');

    const maxWidth = container.clientWidth - 32;
    const maxHeight = container.clientHeight - 32;

    const size = Math.min(
        64,
        Math.floor(maxWidth / cols),
        Math.floor(maxHeight / rows)
    );

    document.documentElement.style.setProperty('--tile-size', `${size}px`);

    gameBoard.style.width = `${cols * size}px`;
    gameBoard.style.height = `${rows * size}px`;
}

function renderGrid(cols, rows) {
    const layerT = document.getElementById('layer-tiles');
    const layerG = document.getElementById('layer-targets');
    for (let y = 0; y < rows; y++) {
        for (let x = 0; x < (grid[y] ? grid[y].length : 0); x++) {
            const cell = grid[y][x];
            if (!cell) continue;
            const tile = document.createElement('div');
            tile.className = `tile ${cell === '#' ? 'tile-wall' : 'tile-floor'}`;
            tile.style.transform = `translate(${x * 100}%, ${y * 100}%)`;
            layerT.appendChild(tile);
            if (cell === '*') {
                const targ = document.createElement('div');
                targ.className = 'tile tile-target';
                targ.style.transform = `translate(${x * 100}%, ${y * 100}%)`;
                layerG.appendChild(targ);
            }
        }
    }
}

function renderEntities() {
    const layerE = document.getElementById('layer-entities');
    let pEl = document.getElementById('player');
    if (!pEl) {
        pEl = document.createElement('div');
        pEl.id = 'player';
        pEl.className = 'entity player';
        pEl.innerHTML = '<div class="player-inner"></div>';
        layerE.appendChild(pEl);
    }
    pEl.style.transform = `translate(${player.x * 100}%, ${player.y * 100}%)`;
    pEl.querySelector('.player-inner').classList.toggle('facing-left', player.facingLeft);

    boxes.forEach(b => {
        let bEl = document.getElementById(b.id);
        if (!bEl) {
            bEl = document.createElement('div');
            bEl.id = b.id;
            bEl.className = 'entity box';
            bEl.innerHTML = '<div class="box-inner"></div>';
            layerE.appendChild(bEl);
        }
        bEl.style.transform = `translate(${b.x * 100}%, ${b.y * 100}%)`;
        bEl.classList.toggle('on-target', grid[b.y][b.x] === '*');
    });
}

function tryMove(dx, dy) {
    if (inputLocked) return;
    inputLocked = true;
    setTimeout(() => inputLocked = false, 120);
    
    if (dx < 0) player.facingLeft = true;
    if (dx > 0) player.facingLeft = false;

    const nx = player.x + dx, ny = player.y + dy;
    if (!grid[ny] || grid[ny][nx] === '#' || grid[ny][nx] === undefined) { 
        sfx.bump(); 
        combo = 0;
        vibrate(100);
        renderEntities(); 
        return; 
    }
    
    const box = boxes.find(b => b.x === nx && b.y === ny);
    if (!box) {
        saveHistory();
        player.x = nx; player.y = ny;
        moves++; sfx.move(); vibrate(20);
        finishMove();
        return;
    }

    const bx = nx + dx, by = ny + dy;
    if (!grid[by] || grid[by][bx] === '#' || grid[by][bx] === undefined || boxes.find(b => b.x === bx && b.y === by)) {
        sfx.error(); combo = 0; vibrate(100); renderEntities(); return;
    }

    saveHistory();
    box.x = bx; box.y = by;
    player.x = nx; player.y = ny;
    moves++; sfx.push(); vibrate(50);
    if (grid[by][bx] === '*') sfx.target();
    finishMove();
}

function saveHistory() {
    history.push({ p: {...player}, b: boxes.map(x => ({...x})), m: moves });
    document.getElementById('btn-undo').disabled = false;
}

function undo() {
    if (!history.length || inputLocked) return;
    const s = history.pop();
    player = s.p; boxes = s.b; moves = s.m;
    if (!history.length) btnUndo.disabled = true;

    sfx.move();
    vibrate(30);

    uiMoves.innerText = moves;
    renderEntities();
}

function finishMove() {
    combo++;
    if (combo >= 3) {
        sfx.stepCombo();
    }
    uiMoves.innerText = moves;
    renderEntities();
    document.getElementById('player').style.transform += " scale(1.1)";
    setTimeout(() => {
        document.getElementById('player').style.transform = 
        `translate(${player.x * 100}%, ${player.y * 100}%)`;
    }, 100);
    if (boxes.every(b => grid[b.y][b.x] === '*')) {
        inputLocked = true;
        setTimeout(() => { sfx.win(); showWin(); }, 500);
    }
}

function showWin() {
    const overlay = document.getElementById('win-overlay');
    const panel = document.getElementById('win-panel');
    const starContainer = document.getElementById('win-stars');
    document.getElementById('win-moves').innerText = moves;
    
    const par = LEVELS[currentLevelIdx].par;
    starContainer.innerText = moves <= par ? "⭐⭐⭐" : (moves <= par * 1.4 ? "⭐⭐" : "⭐");
    starContainer.style.transform = "scale(1.5)";
    setTimeout(() => starContainer.style.transform = "scale(1)", 300);
    
    overlay.classList.remove('opacity-0', 'pointer-events-none');
    panel.classList.remove('scale-90');
}

window.addEventListener('keydown', e => {
    initAudio();
    if (["ArrowUp", "w"].includes(e.key)) tryMove(0, -1);
    if (["ArrowDown", "s"].includes(e.key)) tryMove(0, 1);
    if (["ArrowLeft", "a"].includes(e.key)) tryMove(-1, 0);
    if (["ArrowRight", "d"].includes(e.key)) tryMove(1, 0);
    if (e.key === 'z' && e.ctrlKey) undo();
});

let tX, tY;
window.addEventListener('touchstart', e => { tX = e.touches[0].clientX; tY = e.touches[0].clientY; initAudio(); });
window.addEventListener('touchend', e => {
    if (inputLocked) return;

    const dx = e.changedTouches[0].clientX - tX;
    const dy = e.changedTouches[0].clientY - tY;

    const threshold = 40; // gevoeliger

    if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) return;

    initAudio();

    if (Math.abs(dx) > Math.abs(dy)) {
        tryMove(dx > 0 ? 1 : -1, 0);
    } else {
        tryMove(0, dy > 0 ? 1 : -1);
    }
});

document.getElementById('btn-start').onclick = () => {
    initAudio();
    document.getElementById('start-overlay').style.opacity = '0';
    setTimeout(() => { document.getElementById('start-overlay').remove(); loadLevel(0); }, 700);
};

document.getElementById('btn-restart').onclick = () => {
    sfx.bump();
    vibrate(80);
    loadLevel(currentLevelIdx);
};
document.getElementById('btn-undo').onclick = undo;
document.getElementById('btn-skip').onclick = () => {
    if (inputLocked) return;
    if (!confirm("Weet je zeker dat je dit level wilt overslaan?")) return;

    sfx.error();
    vibrate(100);
    currentLevelIdx = (currentLevelIdx + 1) % LEVELS.length;
    loadLevel(currentLevelIdx);
};
document.getElementById('btn-hint').onclick = () => {
    const hint = hints[Math.floor(Math.random() * hints.length)];
    uiStory.innerHTML = `<span class="text-yellow-300 font-bold">💡 Hint: ${hint}</span>`;
};
document.getElementById('btn-next').onclick = () => {
    document.getElementById('win-overlay').classList.add('opacity-0', 'pointer-events-none');
    document.getElementById('win-panel').classList.add('scale-90');
    currentLevelIdx = (currentLevelIdx + 1) % LEVELS.length;
    setTimeout(() => loadLevel(currentLevelIdx), 400);
};

// Mobile button controls
document.querySelectorAll('.ctrl-btn').forEach(btn => {
    btn.addEventListener('touchstart', () => {
        btn.style.transform = 'scale(0.85)';
    });
    btn.addEventListener('touchend', () => {
        btn.style.transform = 'scale(1)';
    });
    btn.addEventListener('click', () => {
        initAudio();

        const dir = btn.dataset.dir;

        if (dir === 'up') tryMove(0, -1);
        if (dir === 'down') tryMove(0, 1);
        if (dir === 'left') tryMove(-1, 0);
        if (dir === 'right') tryMove(1, 0);
    });
});

window.onresize = () => { if (grid.length) setupScale(grid[0].length, grid.length); };
</script>
</body>
</html>
